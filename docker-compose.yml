services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

  # --- TESTE (padrão): docker compose up -d ---
  backend:
    build: ./backend
    profiles: ["teste", "default"]
    env_file:
      - ./backend/.env
    ports:
      - "3001:3001"
    volumes:
      - whatsapp_auth_teste:/app/data/whatsapp-auth
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: escalas_teste
      DB_NAME_PROD: escalas_prod
      DB_NAME_HML: escalas_hml
      APP_MODE: teste
      JWT_SECRET: escalas_plus_secret_key_2026
      FRONTEND_URL: http://localhost:3000
      WHATSAPP_AUTH_DIR: /app/data/whatsapp-auth
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001/api
        NEXT_PUBLIC_APP_URL: http://localhost:3000
        NEXT_PUBLIC_APP_MODE: teste
    profiles: ["teste", "default"]
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # --- HOMOLOGAÇÃO: docker compose --profile hml up -d ---
  backend-hml:
    build: ./backend
    profiles: ["hml"]
    env_file:
      - ./backend/.env
    ports:
      - "3002:3001"
    volumes:
      - whatsapp_auth_hml:/app/data/whatsapp-auth
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: escalas_hml
      DB_NAME_PROD: escalas_prod
      DB_NAME_HML: escalas_hml
      APP_MODE: hml
      JWT_SECRET: escalas_plus_secret_key_2026
      FRONTEND_URL: http://localhost:3010
      WHATSAPP_AUTH_DIR: /app/data/whatsapp-auth
    depends_on:
      - db

  frontend-hml:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3002/api
        NEXT_PUBLIC_APP_URL: http://localhost:3010
        NEXT_PUBLIC_APP_MODE: hml
    profiles: ["hml"]
    ports:
      - "3010:3000"
    depends_on:
      - backend-hml

  # --- PRODUÇÃO (local): docker compose --profile prod up -d ---
  backend-prod:
    build: ./backend
    profiles: ["prod"]
    env_file:
      - ./backend/.env
    ports:
      - "3003:3001"
    volumes:
      - whatsapp_auth_prod:/app/data/whatsapp-auth
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: escalas_prod
      DB_NAME_PROD: escalas_prod
      DB_NAME_HML: escalas_hml
      APP_MODE: prod
      JWT_SECRET: escalas_plus_secret_key_2026
      FRONTEND_URL: http://localhost:3020
      WHATSAPP_AUTH_DIR: /app/data/whatsapp-auth
    depends_on:
      - db

  frontend-prod:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3003/api
        NEXT_PUBLIC_APP_URL: http://localhost:3020
        NEXT_PUBLIC_APP_MODE: prod
    profiles: ["prod"]
    ports:
      - "3020:3000"
    depends_on:
      - backend-prod

volumes:
  pgdata:
  whatsapp_auth_teste:
  whatsapp_auth_hml:
  whatsapp_auth_prod:
